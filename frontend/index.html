<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Knowledge Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --surface: #13161b;
    --surface2: #1a1e26;
    --border: #252b36;
    --border2: #2e3645;
    --text: #e8eaf0;
    --muted: #6b7585;
    --accent: #4f8ef7;
    --accent-dim: #1e2d4d;
    --success: #3ddc84;
    --success-dim: #142e22;
    --warn: #f5a623;
    --warn-dim: #2e2108;
    --danger: #f05a5a;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: 56px 1fr;
  }

  /* Header */
  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
  }
  .logo { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--accent); }
  .logo span { color: var(--muted); font-weight: 400; }
  .header-status { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--success); }

  /* Sidebar */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }

  /* Upload zone */
  .upload-zone {
    border: 1px dashed var(--border2);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-dim); }
  .upload-zone p { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .upload-icon { font-size: 22px; }
  #file-input { display: none; }

  /* Text ingest */
  .text-area {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .text-area:focus { border-color: var(--accent); }
  .text-source {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    padding: 6px 8px;
    outline: none;
    margin-top: 6px;
    transition: border-color 0.2s;
  }
  .text-source:focus { border-color: var(--accent); }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6ba0ff; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-danger-ghost { background: transparent; color: var(--danger); border: 1px solid transparent; padding: 4px 8px; font-size: 11px; }
  .btn-danger-ghost:hover { border-color: var(--danger); }
  .btn-full { width: 100%; margin-top: 8px; }

  /* Sources list */
  .sources-list { flex: 1; overflow-y: auto; padding: 8px; }
  .source-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .source-item:hover { background: var(--surface2); }
  .source-name { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .source-chunks { font-size: 10px; color: var(--muted); font-family: var(--mono); white-space: nowrap; }
  .empty-sources { padding: 24px 16px; text-align: center; font-size: 12px; color: var(--muted); }

  /* Main chat */
  main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }
  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .welcome {
    text-align: center;
    margin: auto;
    max-width: 480px;
  }
  .welcome h2 { font-size: 20px; font-weight: 400; margin-bottom: 8px; }
  .welcome p { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .welcome-hints { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
  .hint {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s;
    color: var(--text);
    font-family: var(--sans);
  }
  .hint:hover { border-color: var(--accent); }

  /* Messages */
  .message { display: flex; gap: 12px; }
  .message.user { flex-direction: row-reverse; }
  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    flex-shrink: 0;
    font-family: var(--mono);
  }
  .avatar.user { background: var(--accent-dim); color: var(--accent); }
  .avatar.bot { background: var(--surface2); color: var(--muted); }
  .bubble {
    max-width: 72%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.7;
  }
  .message.user .bubble { background: var(--accent-dim); border-color: #2a4070; }
  .bubble.streaming::after { content: '▋'; animation: blink 1s infinite; color: var(--accent); }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* Context accordion */
  .context-toggle {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    user-select: none;
  }
  .context-toggle:hover { color: var(--text); }
  .context-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
  }
  .chip .score { color: var(--success); }

  /* Input */
  .input-row {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    background: var(--surface);
  }
  .query-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    min-height: 44px;
    max-height: 120px;
  }
  .query-input:focus { border-color: var(--accent); }

  /* Toast */
  .toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
  .toast {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    max-width: 320px;
    animation: slide-in 0.2s ease;
  }
  .toast.success { border-left: 3px solid var(--success); }
  .toast.error { border-left: 3px solid var(--danger); }
  .toast.info { border-left: 3px solid var(--accent); }
  @keyframes slide-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Progress */
  .progress-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.3s; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">rag<span>-assistant</span></div>
  <div class="header-status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">connecting…</span>
  </div>
</header>

<aside>
  <div class="sidebar-section">
    <div class="sidebar-label">Ingest document</div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📄</div>
      <p>Drop PDF, TXT, MD, or CSV</p>
      <p>or click to browse</p>
    </div>
    <input type="file" id="file-input" accept=".pdf,.txt,.md,.csv">
    <div class="progress-bar" id="upload-progress" style="display:none">
      <div class="progress-fill" id="upload-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Or paste text</div>
    <textarea class="text-area" id="paste-text" placeholder="Paste any text to index…" rows="4"></textarea>
    <input class="text-source" id="paste-source" placeholder="Source label (e.g. 'meeting-notes')" value="manual_input">
    <button class="btn btn-primary btn-full" onclick="ingestText()">Index text</button>
  </div>

  <div class="sidebar-section" style="flex:1; overflow:hidden; display:flex; flex-direction:column; border-bottom:none;">
    <div class="sidebar-label">Indexed sources</div>
    <div class="sources-list" id="sources-list">
      <div class="empty-sources">No documents indexed yet</div>
    </div>
  </div>
</aside>

<main>
  <div class="chat-window" id="chat-window">
    <div class="welcome" id="welcome">
      <h2>Knowledge Assistant</h2>
      <p>Upload documents on the left, then ask questions about them. Built on ChromaDB + sentence-transformers with OpenAI generation.</p>
      <div class="welcome-hints">
        <button class="hint" onclick="setQuestion('Summarize the key points from my documents')">Summarize the key points from my documents</button>
        <button class="hint" onclick="setQuestion('What are the main topics covered?')">What are the main topics covered?</button>
        <button class="hint" onclick="setQuestion('Find any specific data or numbers mentioned')">Find any specific data or numbers mentioned</button>
      </div>
    </div>
  </div>

  <div class="input-row">
    <textarea class="query-input" id="query-input" placeholder="Ask a question about your documents…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQuery()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="btn btn-primary" id="send-btn" onclick="sendQuery()">Ask →</button>
  </div>
</main>

<div class="toast-container" id="toasts"></div>

<script>
const API = '';

// Health check
async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    if (d.status === 'ok') {
      dot.className = 'dot ok';
      txt.textContent = `${d.vector_store_chunks} chunks · ${d.llm_configured ? 'LLM ready' : 'no LLM key'}`;
    }
  } catch {
    document.getElementById('status-text').textContent = 'offline';
  }
}

// Sources
async function loadSources() {
  try {
    const r = await fetch(API + '/api/v1/sources');
    const d = await r.json();
    const list = document.getElementById('sources-list');
    if (!d.sources.length) {
      list.innerHTML = '<div class="empty-sources">No documents indexed yet</div>';
      return;
    }
    list.innerHTML = d.sources.map(s => `
      <div class="source-item">
        <span class="source-name" title="${s.source}">📄 ${s.source}</span>
        <span class="source-chunks">${s.chunks}c</span>
        <button class="btn btn-danger-ghost" onclick="deleteSource('${s.source}')">✕</button>
      </div>
    `).join('');
  } catch {}
}

async function deleteSource(source) {
  if (!confirm(`Delete "${source}"?`)) return;
  const r = await fetch(API + '/api/v1/sources/' + encodeURIComponent(source), { method: 'DELETE' });
  if (r.ok) { toast('Deleted ' + source, 'success'); loadSources(); checkHealth(); }
  else toast('Delete failed', 'error');
}

// File upload
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));

async function handleFile(file) {
  if (!file) return;
  const prog = document.getElementById('upload-progress');
  const fill = document.getElementById('upload-fill');
  prog.style.display = 'block';
  fill.style.width = '30%';

  const form = new FormData();
  form.append('file', file);
  try {
    fill.style.width = '70%';
    const r = await fetch(API + '/api/v1/ingest/file', { method: 'POST', body: form });
    fill.style.width = '100%';
    const d = await r.json();
    if (r.ok) {
      toast(`Indexed ${d.chunks_added} chunks from ${file.name}`, 'success');
      loadSources(); checkHealth();
    } else {
      toast(d.detail || 'Upload failed', 'error');
    }
  } catch (e) {
    toast('Network error', 'error');
  } finally {
    setTimeout(() => { prog.style.display = 'none'; fill.style.width = '0%'; }, 800);
    document.getElementById('file-input').value = '';
  }
}

// Text ingest
async function ingestText() {
  const text = document.getElementById('paste-text').value.trim();
  const source = document.getElementById('paste-source').value.trim() || 'manual_input';
  if (!text) return toast('No text to index', 'error');
  const r = await fetch(API + '/api/v1/ingest/text', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, source }),
  });
  const d = await r.json();
  if (r.ok) {
    toast(`Indexed ${d.chunks_added} chunks`, 'success');
    document.getElementById('paste-text').value = '';
    loadSources(); checkHealth();
  } else {
    toast(d.detail || 'Failed', 'error');
  }
}

// Query
let streaming = false;
function setQuestion(q) { document.getElementById('query-input').value = q; }

async function sendQuery() {
  if (streaming) return;
  const input = document.getElementById('query-input');
  const question = input.value.trim();
  if (!question) return;
  input.value = '';
  input.style.height = 'auto';

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  appendMessage('user', question);
  const botBubble = appendMessage('bot', '', true);
  streaming = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const r = await fetch(API + '/api/v1/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, stream: true }),
    });

    if (!r.ok) {
      const err = await r.json();
      botBubble.querySelector('.bubble').textContent = err.detail || 'Error occurred.';
      botBubble.querySelector('.bubble').classList.remove('streaming');
      return;
    }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let answer = '';
    let context = [];
    const bubble = botBubble.querySelector('.bubble');

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const text = decoder.decode(value);
      const lines = text.split('\n').filter(l => l.startsWith('data: '));
      for (const line of lines) {
        const payload = JSON.parse(line.slice(6));
        if (payload.type === 'context') context = payload.context;
        if (payload.type === 'token') { answer += payload.token; bubble.textContent = answer; scrollChat(); }
        if (payload.type === 'done') {
          bubble.classList.remove('streaming');
          if (context.length) appendContext(botBubble, context);
        }
      }
    }
  } catch (e) {
    botBubble.querySelector('.bubble').textContent = 'Network error. Is the server running?';
    botBubble.querySelector('.bubble').classList.remove('streaming');
  } finally {
    streaming = false;
    document.getElementById('send-btn').disabled = false;
  }
}

function appendMessage(role, text, streaming = false) {
  const chat = document.getElementById('chat-window');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  const avatar = role === 'user' ? 'you' : 'rag';
  div.innerHTML = `
    <div class="avatar ${role}">${avatar}</div>
    <div>
      <div class="bubble ${streaming ? 'streaming' : ''}">${text}</div>
    </div>
  `;
  chat.appendChild(div);
  scrollChat();
  return div;
}

function appendContext(msgEl, context) {
  const container = msgEl.querySelector('div:last-child');
  const toggle = document.createElement('div');
  toggle.className = 'context-toggle';
  toggle.innerHTML = `<span>▶</span> ${context.length} source chunk${context.length > 1 ? 's' : ''} retrieved`;
  const chips = document.createElement('div');
  chips.className = 'context-chips';
  chips.style.display = 'none';
  context.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${c.source.split('/').pop()} <span class="score">${(c.score * 100).toFixed(0)}%</span>`;
    chip.title = c.content.slice(0, 200) + '…';
    chips.appendChild(chip);
  });
  toggle.onclick = () => {
    const open = chips.style.display === 'flex';
    chips.style.display = open ? 'none' : 'flex';
    toggle.querySelector('span').textContent = open ? '▶' : '▼';
  };
  container.appendChild(toggle);
  container.appendChild(chips);
}

function scrollChat() {
  const chat = document.getElementById('chat-window');
  chat.scrollTop = chat.scrollHeight;
}

// Toast
function toast(msg, type = 'info') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// Init
checkHealth();
loadSources();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
